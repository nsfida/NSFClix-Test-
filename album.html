<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Album | NSF Clix</title>

<meta name="description" content="Photography album from NSF Clix featuring architectural, landscape and documentary photography.">

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>

<style>

.album-header{
height:50vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:url("images/disneydubai.jpg") center/cover no-repeat;
position:relative;
}

.album-header::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
}

.album-header h1{
position:relative;
z-index:2;
font-size:48px;
letter-spacing:3px;
}

.breadcrumb{
padding:100px 8% 0 8%;
font-size:14px;
opacity:0.8;
}

.breadcrumb a{
text-decoration:none;
color:#ffc400;
}

</style>

</head>

<body class="dark">

<header class="header">

<div class="logo">
<img src="logo.png" alt="NSF Clix" id="logo">
</div>

<div class="nav-links">
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="gallery.html">Gallery</a></li>
<li><a href="index.html#exhibitions">Exhibitions</a></li>
<li><a href="index.html#about">About</a></li>
<li><a href="index.html#contact">Contact</a></li>
</ul>
</div>

<div class="theme-icons">
<i class="fas fa-sun" id="lightMode"></i>
<i class="fas fa-moon" id="darkMode"></i>
</div>

<div class="menu-toggle" id="menuToggle">
<span></span>
<span></span>
<span></span>
</div>

</header>

<section class="album-header">
<h1 id="albumTitle">Album</h1>
</section>

<div class="breadcrumb">
<a href="index.html">Home</a> → 
<a href="gallery.html">Gallery</a> → 
<span id="albumBreadcrumb">Album</span>
</div>

<section class="gallery">

<h2 class="section-title" id="albumHeading">Photography</h2>

<div class="gallery-grid" id="gallery-grid">
</div>

</section>

<footer>
<p>© 2026 NSF Clix • Photography by Nadeem Shahzad Fida</p>
</footer>

<div id="lightbox">
<span class="close-lightbox">×</span>
<img class="lightbox-image">
<div class="lightbox-details"></div>
</div>

<script src="script.js"></script>

<script>

const params = new URLSearchParams(window.location.search);
const category = params.get("category");

const title = category ? category.charAt(0).toUpperCase() + category.slice(1) : "Album";

document.getElementById("albumTitle").innerText = title;
document.getElementById("albumHeading").innerText = title + " Photography";
document.getElementById("albumBreadcrumb").innerText = title;

fetch("./gallery.json")
.then(res => res.json())
.then(photos => {

const galleryGrid = document.getElementById("gallery-grid");

const filtered = photos.filter(photo => photo.category === category);

filtered.forEach(photo => {

const item = document.createElement("div");
item.classList.add("gallery-item");

item.innerHTML = `
<img src="images/${photo.image}" alt="${photo.title}">

<div class="gallery-overlay">
<h3>${photo.title}</h3>
<p>${photo.location}</p>
</div>

<div class="photo-details" style="display:none;">
${photo.camera ? `<p><strong>Camera:</strong> ${photo.camera}</p>` : ""}
${photo.lens ? `<p><strong>Lens:</strong> ${photo.lens}</p>` : ""}
${photo.aperture ? `<p><strong>Aperture:</strong> ${photo.aperture}</p>` : ""}
${photo.shutter ? `<p><strong>Shutter Speed:</strong> ${photo.shutter}</p>` : ""}
${photo.iso ? `<p><strong>ISO:</strong> ${photo.iso}</p>` : ""}
${photo.story ? `<p>${photo.story}</p>` : ""}
</div>
`;

galleryGrid.appendChild(item);

});

initGallery();

})
.catch(err => console.error("Failed to load gallery.json:", err));

</script>

</body>
</html>

<style>

.albums{
padding:120px 8%;
}

.album-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

.album{
position:relative;
overflow:hidden;
border-radius:12px;
text-decoration:none;
color:white;
}

.album img{
width:100%;
height:260px;
object-fit:cover;
transition:0.6s;
display:block;
}

.album:hover img{
transform:scale(1.08);
}

.album-title{
position:absolute;
bottom:0;
left:0;
width:100%;
padding:20px;
background:linear-gradient(transparent,rgba(0,0,0,0.9));
font-size:20px;
font-weight:600;
}

body.light .album-title{
background:linear-gradient(transparent,rgba(255,255,255,0.9));
color:#111;
}

.page-header{
height:55vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:url("images/disneydubai.jpg") center/cover no-repeat;
position:relative;
}

.page-header::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.page-header h1{
position:relative;
z-index:2;
font-size:48px;
letter-spacing:3px;
}

</style>

</head>
